kind = "web"
previewPath = "/admin-portal/"
title = "Admin Portal"
version = "1.0.0"
id = "artifacts/admin-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25580
name = "web"
paths = ["/admin-portal/"]

[services.development]
run = "pnpm --filter @workspace/admin-portal run dev"

[services.env]
PORT = "25580"
BASE_PATH = "/admin-portal/"

[services.production]
build = ["pnpm", "--filter", "@workspace/admin-portal", "run", "build"]
publicDir = "artifacts/admin-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
