kind = "web"
previewPath = "/"
title = "LibraryOS"
version = "1.0.0"
id = "artifacts/library-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21452
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/library-os run dev"

[services.env]
PORT = "21452"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/library-os", "run", "build"]
publicDir = "artifacts/library-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
